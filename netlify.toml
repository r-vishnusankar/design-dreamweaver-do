# Marketing studio (The Virtual Invite) — must build from REPO ROOT.
# In Netlify UI: Site configuration → Build & deploy → Continuous deployment
#   Base directory: (leave EMPTY / blank)
#   Package directory: (leave EMPTY) — do not select packages/config
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
